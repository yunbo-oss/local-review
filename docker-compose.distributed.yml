# 分布式 + Jaeger：1 Nginx + 3 Go 实例 + 链路追踪
# 启动：docker compose -f docker-compose.yml -f docker-compose.distributed.yml up -d --build
# 访问：http://localhost:80（Nginx）| http://localhost:16686（Jaeger UI）

services:
  nginx:
    image: nginx:alpine
    container_name: local-review-nginx
    ports:
      - "80:80"
    volumes:
      - ./configs/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      go-app-1:
        condition: service_healthy
      go-app-2:
        condition: service_healthy
      go-app-3:
        condition: service_healthy
    networks:
      - app-net

  jaeger:
    image: jaegertracing/all-in-one:1.73.0
    container_name: local-review-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - app-net

  go-app-1:
    build: .
    expose:
      - "8088"
    container_name: local-review-go-1
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8088/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 35s
    env_file:
      - .env
    environment:
      MYSQL_ADDR: mysql
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-8888.216}
      REDIS_ADDR: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-8888.216}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-review-key-change-in-production}
      ROCKETMQ_NAMESRV_ADDR: rocketmq-namesrv:9876
      MYSQL_MAX_OPEN_CONNS: "30"
      LOG_FORMAT: json
      INSTANCE_ID: go-app-1
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      SECKILL_RATE_LIMIT: "10000"
      SECKILL_RATE_BURST: "20000"
    command: sh -c "sleep 20 && ./server"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq-namesrv:
        condition: service_started
      rocketmq-broker:
        condition: service_started
      jaeger:
        condition: service_started
    networks:
      - app-net

  go-app-2:
