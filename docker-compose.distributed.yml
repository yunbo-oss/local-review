      MYSQL_ADDR: mysql
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-8888.216}
      REDIS_ADDR: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-8888.216}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-review-key-change-in-production}
      ROCKETMQ_NAMESRV_ADDR: rocketmq-namesrv:9876
      MYSQL_MAX_OPEN_CONNS: "30"
      LOG_FORMAT: json
      INSTANCE_ID: go-app-2
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      SECKILL_RATE_LIMIT: "10000"
      SECKILL_RATE_BURST: "20000"
    command: sh -c "sleep 20 && ./server"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq-namesrv:
        condition: service_started
      rocketmq-broker:
        condition: service_started
      jaeger:
        condition: service_started
    networks:
      - app-net

  go-app-3:
