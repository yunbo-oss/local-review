# 分布式部署：1 个 Nginx + 3 个 Go 实例
# 与 docker-compose.yml 合并使用，启动 MySQL、Redis、RocketMQ、Nginx、3 个 Go 实例
# 启动：docker-compose -f docker-compose.yml -f docker-compose.distributed.yml up -d

version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: local-review-nginx
    ports:
      - "80:80"
    volumes:
      - ./configs/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - go-app-1
      - go-app-2
      - go-app-3
    networks:
      - app-net

  go-app-1:
    build: .
    expose:
      - "8088"
    container_name: local-review-go-1
    environment:
      MYSQL_ADDR: mysql
      REDIS_ADDR: redis
      ROCKETMQ_NAMESRV_ADDR: rocketmq-namesrv:9876
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  go-app-2:
    build: .
    expose:
      - "8088"
    container_name: local-review-go-2
    environment:
      MYSQL_ADDR: mysql
      REDIS_ADDR: redis
      ROCKETMQ_NAMESRV_ADDR: rocketmq-namesrv:9876
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  go-app-3:
    build: .
    expose:
      - "8088"
    container_name: local-review-go-3
    environment:
      MYSQL_ADDR: mysql
      REDIS_ADDR: redis
      ROCKETMQ_NAMESRV_ADDR: rocketmq-namesrv:9876
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net
