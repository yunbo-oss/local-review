# 单机本地：MySQL + Redis + RocketMQ（依赖）
# 启动：docker compose up -d
# 服务：make run 或 go run ./cmd/server，访问 http://localhost:8088

services:
  mysql:
    image: mysql:8.0
    container_name: local-review-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "8888.216"
      MYSQL_DATABASE: local_review_go
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis Stack：支持向量检索（RAG 智能点评）
  # 用 REDIS_ARGS 设置密码，避免 command 覆盖导致 RediSearch 模块未加载
  redis:
    image: redis/redis-stack-server:latest
    container_name: local-review-redis
    environment:
      REDIS_ARGS: "--requirepass 8888.216"
    ports:
      - "6379:6379"
      - "8001:8001"   # RedisInsight Web UI
    volumes:
      - redis_data:/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "8888.216", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # RocketMQ（秒杀异步消费）
  rocketmq-namesrv:
    image: apache/rocketmq:5.3.2
    container_name: local-review-rocketmq-namesrv
    ports:
      - "9876:9876"
    networks:
      - app-net
    command: sh mqnamesrv

  rocketmq-broker:
    image: apache/rocketmq:5.3.2
    container_name: local-review-rocketmq-broker
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    environment:
      NAMESRV_ADDR: "rocketmq-namesrv:9876"
    depends_on:
      - rocketmq-namesrv
    networks:
      - app-net
    command: sh mqbroker


volumes:
  mysql_data:
  redis_data:


networks:
  app-net:
    driver: bridge
