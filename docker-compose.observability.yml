# 可观测性扩展：Loki 集中日志收集（可选）
# 与 docker-compose.yml + docker-compose.distributed.yml 合并使用
# 启动：docker-compose -f docker-compose.yml -f docker-compose.distributed.yml -f docker-compose.observability.yml up -d
# 日志查询：http://localhost:3100 (Loki API) 或配合 Grafana 使用

version: '3.8'

services:
  loki:
    image: grafana/loki:2.9.0
    container_name: local-review-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - app-net

  promtail:
    image: grafana/promtail:2.9.0
    container_name: local-review-promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./configs/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - app-net

volumes:
  loki_data:
    external: false
