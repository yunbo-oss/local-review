# 分布式部署（无 Jaeger）：1 个 Nginx + 3 个 Go 实例
# 当 Jaeger 镜像拉取失败时使用此文件
# 启动：docker compose -f docker-compose.yml -f docker-compose.distributed.minimal.yml up -d --build

version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: local-review-nginx
    ports:
      - "80:80"
    volumes:
      - ./configs/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      go-app-1:
        condition: service_healthy
      go-app-2:
        condition: service_healthy
      go-app-3:
        condition: service_healthy
    networks:
      - app-net

  go-app-1:
    build: .
    expose:
      - "8088"
    container_name: local-review-go-1
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8088/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 35s
    env_file:
      - .env
    environment:
      MYSQL_ADDR: mysql
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-8888.216}
      REDIS_ADDR: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-8888.216}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-review-key-change-in-production}
      ROCKETMQ_NAMESRV_ADDR: rocketmq-namesrv:9876
      MYSQL_MAX_OPEN_CONNS: "30"
      LOG_FORMAT: json
      INSTANCE_ID: go-app-1
      SECKILL_RATE_LIMIT: "50"
      SECKILL_RATE_BURST: "80"
      LOGIN_RATE_LIMIT: "1000"
      LOGIN_RATE_BURST: "100"
    command: sh -c "sleep 20 && ./server"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq-namesrv:
        condition: service_started
      rocketmq-broker:
        condition: service_started
    networks:
      - app-net

  go-app-2:
    build: .
    expose:
      - "8088"
    container_name: local-review-go-2
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8088/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 35s
    env_file:
      - .env
    environment:
      MYSQL_ADDR: mysql
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-8888.216}
      REDIS_ADDR: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-8888.216}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-review-key-change-in-production}
      ROCKETMQ_NAMESRV_ADDR: rocketmq-namesrv:9876
      MYSQL_MAX_OPEN_CONNS: "30"
      LOG_FORMAT: json
      INSTANCE_ID: go-app-2
      SECKILL_RATE_LIMIT: "50"
      SECKILL_RATE_BURST: "80"
      LOGIN_RATE_LIMIT: "1000"
      LOGIN_RATE_BURST: "100"
    command: sh -c "sleep 20 && ./server"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq-namesrv:
        condition: service_started
      rocketmq-broker:
        condition: service_started
    networks:
      - app-net

  go-app-3:
    build: .
    expose:
      - "8088"
    container_name: local-review-go-3
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8088/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 35s
    env_file:
      - .env
    environment:
      MYSQL_ADDR: mysql
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-8888.216}
      REDIS_ADDR: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-8888.216}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-review-key-change-in-production}
      ROCKETMQ_NAMESRV_ADDR: rocketmq-namesrv:9876
      MYSQL_MAX_OPEN_CONNS: "30"
      LOG_FORMAT: json
      INSTANCE_ID: go-app-3
      SECKILL_RATE_LIMIT: "50"
      SECKILL_RATE_BURST: "80"
      LOGIN_RATE_LIMIT: "1000"
      LOGIN_RATE_BURST: "100"
    command: sh -c "sleep 20 && ./server"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq-namesrv:
        condition: service_started
      rocketmq-broker:
        condition: service_started
    networks:
      - app-net
