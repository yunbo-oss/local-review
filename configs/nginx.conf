events {
    worker_connections 1024;
}

http {
    # 被动健康检查：max_fails=3 次失败后剔除，fail_timeout=30s 内不再转发
    # 当 /health 返回 5xx 或连接超时时计数，健康后自动恢复
    upstream go_backend {
        least_conn;
        server go-app-1:8088 max_fails=3 fail_timeout=30s;
        server go-app-2:8088 max_fails=3 fail_timeout=30s;
        server go-app-3:8088 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://go_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
